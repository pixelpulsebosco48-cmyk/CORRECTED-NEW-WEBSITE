<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <style>
        /* 基礎樣式重設 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #2b2d42; font-family: 'Courier New', monospace; color: #edf2f4; }
        
        /* 街機主選單螢幕 */
        #menu-screen { position: absolute; width: 100%; height: 100%; overflow-y: auto; padding: 20px; z-index: 100; background: #1a1a24; display: flex; flex-direction: column; align-items: center; }
        .title { font-size: 28px; font-weight: bold; color: #ef233c; text-shadow: 3px 3px 0px #8d99ae; text-align: center; margin: 20px 0; }
        .subtitle { font-size: 14px; color: #8d99ae; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; width: 100%; max-width: 600px; }
        .game-card { background: #3d405b; border: 4px solid #f4f1de; border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; box-shadow: 0 4px 0 #e07a5f; transition: 0.1s; font-size: 13px; font-weight: bold; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .game-card:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }

        /* 遊戲舞台螢幕 */
        #game-screen { position: absolute; width: 100%; height: 100%; display: none; z-index: 50; }
        #canvas-container { width: 100%; height: 100%; background: #feeafa; position: absolute; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 遊戲畫面通用 UI 疊加層 */
        #hud { position: absolute; top: 15px; width: 100%; text-align: center; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 0px #000; pointer-events: none; z-index: 80; color: #3d405b; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 80; }
        .btn { background: #e07a5f; color: white; border: 3px solid #3d405b; padding: 10px 20px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; box-shadow: 0 3px 0 #3d405b; }
        .btn:active { transform: translateY(3px); box-shadow: 0 0 0 #000; }
        #back-btn { position: absolute; top: 15px; left: 15px; background: #8d99ae; z-index: 90; padding: 6px 12px; font-size: 12px; }
    </style>
</head>
<body>

    <!-- 主選單 -->

        <div class="grid" id="menu-grid"></div>

            { id: 5, name: "5. 焦慮幾何粉碎 🔺", desc: "沒有失敗的形狀填滿", hud: "拖曳或點擊填滿空間", btns: ["下一關 Next"] },
            { id: 6, name: "6. 尖叫泡泡紙 🧼", desc: "會發出怪聲的無限泡泡", hud: "點擊畫面瘋狂擠壓！", btns: ["換一張 Reset"] },
            { id: 7, name: "7. 業障流水撈魚 🐟", desc: "用念力極速釣魚", hud: "當泛起漣漪時點擊！", btns: ["拉線起魚！"] },

            card.onclick = () => launchGame(g.id);
            menuGrid.appendChild(card);
        });

        // 返回選單按鈕
        backBtn.onclick = () => {
            cancelAnimationFrame(animationFrameId);
            gameScreen.style.display = 'none';
            menuScreen.style.display = 'flex';
            currentActiveGame = null;
        };

        // --- 2. 核心音效合成引擎 (Web Audio API - 完全不佔容量) ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSynthSound(freq, type = 'sine', duration = 0.3) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.onresize = resizeCanvas;

        // 啟動指定遊戲
        function launchGame(id) {
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            resizeCanvas();
            initAudio();
            
            const gameData = games.find(g => g.id === id);
            hud.innerText = gameData.hud;
            currentActiveGame = id;
            
            // 生成控制按鈕
            controls.innerHTML = '';
            gameData.btns.forEach((btnText, index) => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = btnText;
                b.onclick = () => handleGameInput(id, index);
                controls.appendChild(b);
            });

            // 初始化空白狀態機
            gameState = { timer: 0, entities: [], score: 0, customVal: 1.0 };
            
            // Canvas 點擊映射
            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;
                handleCanvasClick(id, clickX, clickY);
            };

            setupSpecificGame(id);
            gameLoop();
        }

                        gameState.entities.push({x: 40+i*50, y: 120+j*50, r: 20, popped: false});
                    }
                }

tities.forEach(st => {ctx.fillStyle = st.col;ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI2); ctx.fill();ctx.lineWidth = 4; ctx.strokeStyle = "#3d405b"; ctx.stroke();});}else if (currentActiveGame === 3) {ctx.fillStyle = "#3d405b"; ctx.fillRect(canvas.width/2 - 60, canvas.height/2, 120, 100);ctx.fillStyle = "#81b29a"; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2 - 40, 35, 0, Math.PI2); ctx.fill();ctx.fillStyle = "#3d405b"; ctx.fillRect(canvas.width/2 - 20, canvas.height/2 - 45, 10, 20); ctx.fillRect(canvas.width/2 + 10, canvas.height/2 - 45, 10, 20);}else if (currentActiveGame === 4) {gameState.entities.forEach(box => {ctx.fillStyle = box.state === 'hidden' ? '#3d405b' : '#f2cc8f';ctx.fillRect(box.x, box.y, box.w, box.h);ctx.strokeStyle = '#2b2d42'; ctx.lineWidth = 2; ctx.strokeRect(box.x, box.y, box.w, box.h);});}else if (currentActiveGame === 5) {ctx.fillStyle = "#e07a5f"; ctx.beginPath(); ctx.moveTo(canvas.width/2, 150); ctx.lineTo(canvas.width/2 - 80, 300); ctx.lineTo(canvas.width/2 + 80, 300); ctx.closePath(); ctx.fill();ctx.fillStyle = "rgba(61,64,91,0.3)"; ctx.fillRect(canvas.width/2 - 40, 200, 80, 80);}else if (currentActiveGame === 6) {gameState.entities.forEach(p => {ctx.fillStyle = p.popped ? "#8d99ae" : "#81b29a";ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI2); ctx.fill();ctx.strokeStyle = "#3d405b"; ctx.stroke();});}else if (currentActiveGame === 7) {let wave = Math.sin(gameState.timer) * 40 + canvas.width/2;ctx.fillStyle = "#81b29a"; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, Math.abs(Math.sin(gameState.timer)120), 0, Math.PI2); ctx.fill();ctx.fillStyle = "#e07a5f"; ctx.fillRect(wave - 10, canvas.height/2 - 10, 20, 20);}else if (currentActiveGame === 8) {ctx.strokeStyle = "rgba(61,64,91,0.4)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(100, 150); ctx.lineTo(200, 220); ctx.lineTo(150, 320); ctx.stroke();ctx.fillStyle = "#e07a5f"; ctx.fillRect(100, 150, 10, 10); ctx.fillRect(200, 220, 10, 10); ctx.fillRect(150, 320, 10, 10);}else if (currentActiveGame === 9) {ctx.fillStyle = "#f2cc8f"; ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(gameState.customVal * Math.PI / 180); ctx.fillRect(-50, -50, 100, 100); ctx.restore();}else if (currentActiveGame === 10) {gameState.entities.forEach(p => {ctx.fillStyle = "#8d99ae"; ctx.fillRect(p.x, p.y, 25, 20);ctx.fillStyle = "#e07a5f"; ctx.fillRect(p.x + 20, p.y + 5, 8, 5);});}else if (currentActiveGame === 11) {gameState.entities.forEach(l => { ctx.fillStyle = l.c; ctx.fillRect(l.x, l.y, l.r, l.r + 5); });}else if (currentActiveGame === 12) {if (gameState.jumping) {gameState.jumpY += 4;if(gameState.jumpY > 100) { gameState.jumping = false; gameState.jumpY = 0; }}ctx.fillStyle = "#3d405b"; ctx.fillRect(80, canvas.height - 100 - (gameState.jumping ? Math.sin(gameState.jumpY/100Math.PI)80 : 0), 40, 30);let obsX = (canvas.width - (gameState.timer * 150) % canvas.width);ctx.fillStyle = "#ef233c"; ctx.fillRect(obsX, canvas.height - 100, 20, 30);}else if (currentActiveGame === 13) {ctx.fillStyle = "rgba(61,64,91,0.2)"; ctx.fillRect(30, 100, canvas.width - 60, 200);ctx.fillStyle = "#e07a5f"; ctx.beginPath(); ctx.arc(gameState.player.x, gameState.player.y, 12, 0, Math.PI2); ctx.fill();}else if (currentActiveGame === 14) {ctx.fillStyle = "#3d405b"; ctx.fillRect(50, canvas.height - 150, canvas.width - 100, 20);gameState.entities.forEach(c => {c.y += c.vY; if(c.y > canvas.height - 150) { c.y = canvas.height - 150; c.vY = 0; }ctx.fillStyle = "#f2cc8f"; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();ctx.strokeStyle = "#3d405b"; ctx.stroke();});}else if (currentActiveGame === 15) {ctx.fillStyle = "#81b29a"; ctx.fillRect(canvas.width/2 - 15, canvas.height/2 - 40 + Math.sin(gameState.timer)*5, 30, 120);ctx.fillStyle = "#e07a5f"; ctx.fillRect(canvas.width/2 - 40, canvas.height/2 + 80, 80, 30);}
